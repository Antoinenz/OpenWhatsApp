name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        # --ignore-scripts skips the postinstall icon-generation step (needs
        # rsvg-convert which isn't on Windows runners); icons are pre-committed.
        run: npm ci --ignore-scripts

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OpenWhatsApp ${{ github.ref_name }}
          releaseBody: |
            ## What's new in 0.1.2

            - **Links now open** – clicking a link in a chat (or anything
              that calls `window.open`) launches it in your default browser
              instead of doing nothing.
            - **Drag-and-drop file uploads fixed** – dragging a file onto a
              chat now reaches WhatsApp's upload handler instead of being
              swallowed by the window.
            - **Notifications made more reliable** – toast notifications now
              retry with a guaranteed-registered fallback identity if
              OpenWhatsApp's own isn't recognised on your machine, instead of
              silently failing with no toast and no error.
            - **Accent colour is blue everywhere** – WhatsApp's green is now
              replaced with the icon's blue across every place it could hide
              (stylesheets, inline styles, CSS variables set at runtime).

            See the [full commit history](https://github.com/Antoinenz/openwhatsapp/commits/main) for details.

            ## Installation
            Download **OpenWhatsApp_${{ github.ref_name }}_x64-setup.exe** below and run it.
            WebView2 is included with Windows 10/11 — no extra runtime needed.
          releaseDraft: false
          prerelease: false
