name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        # --ignore-scripts skips the postinstall icon-generation step (needs
        # rsvg-convert which isn't on Windows runners); icons are pre-committed.
        run: npm ci --ignore-scripts

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OpenWhatsApp ${{ github.ref_name }}
          releaseBody: |
            ## What's new
            See [CHANGELOG](https://github.com/Antoinenz/openwhatsapp/commits/main) for full details.

            ## Installation
            Download **OpenWhatsApp_${{ github.ref_name }}_x64-setup.exe** below and run it.
            WebView2 is included with Windows 10/11 — no extra runtime needed.
          releaseDraft: false
          prerelease: false
