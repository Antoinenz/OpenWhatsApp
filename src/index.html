<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWhatsApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111b21;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e9edef;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #00a884;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 48px; height: 48px; fill: white; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #2a3942;
      border-top-color: #00a884;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #8696a0; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <!-- WhatsApp-style icon -->
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.47.67 4.786 1.836 6.77L2 30l7.438-1.8A13.94 13.94 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm7.44 19.44c-.308.87-1.8 1.664-2.466 1.72-.666.056-1.302.302-4.398-1.028-3.752-1.608-6.16-5.43-6.348-5.68-.188-.25-1.526-2.03-1.526-3.876 0-1.846.966-2.758 1.308-3.134.342-.376.748-.47.998-.47.25 0 .5.002.718.012.23.01.54-.088.846.644.308.732.958 2.578 1.042 2.768.084.19.14.41.028.658-.112.248-.168.402-.336.62-.168.218-.354.486-.504.652-.168.188-.344.39-.148.766.196.376.872 1.436 1.872 2.326 1.286 1.146 2.372 1.5 2.748 1.668.376.168.596.14.816-.084.22-.224.942-1.098 1.194-1.474.252-.376.504-.314.846-.188.342.126 2.178 1.028 2.554 1.214.376.188.626.28.718.436.094.156.094.902-.214 1.772z"/>
      </svg>
    </div>
    <div class="spinner"></div>
    <p>Loading WhatsApp…</p>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
